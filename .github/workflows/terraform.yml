
name: Terraform Validation


on:

 push:

  branches:

   - main



jobs:

 terraform:


  runs-on: ubuntu-latest


  steps:


  - uses: actions/checkout@v4


  - uses: hashicorp/setup-terraform@v3



  - name:
      Terraform Init

    run:

      terraform init

    working-directory: terraform



  - name:
      Terraform Validate

    run:

      terraform validate

    working-directory: terraform


  - name:
      Terraform Format

    run:

      terraform fmt -check

    working-directory: terraform
